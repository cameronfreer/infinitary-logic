name = "InfinitaryLogic"
version = "0.1.0"
keywords = ["math"]
license = "Apache-2.0"
defaultTargets = ["InfinitaryLogic"]

[[require]]
name = "LeanArchitect"
git = "https://github.com/hanwenzhu/LeanArchitect.git"
rev = "d9013cc08bd2"

[[require]]
name = "checkdecls"
git = "https://github.com/PatrickMassot/checkdecls.git"
rev = "3d425859e73fcfbef85b9638c2a91708ef4a22d4"

# Mathlib last so its dependency versions take precedence over transitive ones
# (e.g. batteries / Cli pulled in by LeanArchitect), per Mathlib's lake update guidance.
[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4"
rev = "v4.32.0"

[[lean_lib]]
name = "InfinitaryLogic"

[[lean_lib]]
name = "InfinitaryLogicConditional"
roots = ["InfinitaryLogic.Conditional"]
globs = ["InfinitaryLogic.Conditional.*"]

# Non-default target for the work-in-progress frontier (Skolem towers + EM term model);
# built explicitly in CI so toolchain bumps cannot silently break it.
[[lean_lib]]
name = "InfinitaryLogicWIP"
roots = ["InfinitaryLogic.WIP"]
