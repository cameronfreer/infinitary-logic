name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Pure CI: build + checks only (~5 min). The site (API docs, blueprint web/PDF,
# homepage, Pages deploy) is built by docs.yml — weekly cron or manual dispatch
# (gh workflow run docs.yml) — since doc-gen4 alone takes ~21 min per run.
jobs:
  build:
    runs-on: ubuntu-latest
    name: Build project and run checks
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Lean project and blueprint data
        uses: leanprover/lean-action@c544e89643240c6b398f14a431bcdc6309e36b3e
        with:
          build: true
          build-args: "InfinitaryLogic :blueprint :blueprintJson InfinitaryLogicWIP"
          use-github-cache: true
          use-mathlib-cache: true

      - name: Verify sorry boundary
        run: python3 scripts/check_sorry_boundary.py

      - name: Verify local EMContext import boundary
        run: bash scripts/check_local_boundary.sh

      - name: Check blueprint declarations
        run: lake exe checkdecls blueprint/lean_decls

      - name: Verify headline declarations (default-import smoke + standard axioms)
        run: bash scripts/check_headline_axioms.sh

      - name: Verify morley_hanf dependency cone (bounded ER yes, infinite Ramsey / legacy ladder no)
        run: lake env lean scripts/check_morley_hanf_deps.lean
