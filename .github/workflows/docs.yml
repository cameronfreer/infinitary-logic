name: Build and Deploy Site

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 0'  # weekly, Sunday 6am UTC

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

# The full site pipeline (API docs via doc-gen4, blueprint web + PDF, homepage,
# GitHub Pages deploy). Kept off the push path — doc-gen4 alone takes ~21 min —
# so per-push CI (build.yml) stays fast. Trigger manually with
# `gh workflow run docs.yml` to refresh the site after notable pushes.
jobs:
  docs:
    runs-on: ubuntu-latest
    name: Build and deploy API docs + blueprint + homepage
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: false
          swap-storage: false

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Lean project and blueprint
        uses: leanprover/lean-action@c544e89643240c6b398f14a431bcdc6309e36b3e
        with:
          build: true
          build-args: "InfinitaryLogic :blueprint :blueprintJson InfinitaryLogicWIP"
          use-github-cache: true
          use-mathlib-cache: true

      - name: Build API docs
        run: |
          cd docbuild
          lake build InfinitaryLogic:docs

      - name: Install blueprint dependencies (cached apt)
        uses: awalsh128/cache-apt-pkgs-action@553a35bb8ebd9fcabcb1c9451aa4c98e1b4ca8a9 # v1.6.3
        with:
          packages: graphviz libgraphviz-dev texlive-binaries texlive-bibtex-extra texlive-latex-extra texlive-xetex texlive-fonts-recommended texlive-fonts-extra latexmk
          version: 1.1

      - name: Install leanblueprint
        run: pip install leanblueprint

      - name: Generate bibliography for web
        run: |
          cd blueprint/src
          pdflatex -interaction=nonstopmode print.tex || true
          bibtex print
          cp print.bbl web.bbl

      - name: Build blueprint website
        run: leanblueprint web

      # lean_decls is committed so the fast per-push CI can run checkdecls without
      # a blueprint build; the web build above regenerates it, so fail here if the
      # committed snapshot has drifted from the blueprint sources.
      - name: Check lean_decls freshness and declarations
        run: |
          git diff --exit-code blueprint/lean_decls
          lake exe checkdecls blueprint/lean_decls

      - name: Build blueprint PDF
        run: leanblueprint pdf

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: home_page

      - name: Build homepage
        run: |
          cd home_page
          bundle exec jekyll build --baseurl "/infinitary-logic" --destination ../_site

      - name: Assemble site
        run: |
          mkdir -p _site/blueprint
          cp -r blueprint/web/* _site/blueprint/
          cp blueprint/print/print.pdf _site/blueprint/blueprint.pdf
          cp -r docbuild/.lake/build/doc _site/docs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: docs
    runs-on: ubuntu-latest
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
